name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  quality-and-smoke:
    runs-on: ubuntu-latest
    env:
      MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check Python tests scripts

      - name: Unit tests
        run: pytest -q tests

      - name: Notebook smoke test
        run: python scripts/notebook_smoke_test.py --verbose

      - name: Canonical paper experiments
        run: python scripts/run_paper_experiments.py --check artifacts/paper_experiment_baselines.json --tolerance 1e-4
